<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' blob: file:; img-src 'self' data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 Music Player</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem 0;
    }
    .player {
      width: 90%;
      max-width: 600px;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(10px);
    }
    .cover {
      width: 200px;
      height: 200px;
      background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      overflow: hidden;
    }
    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      border-radius: 12px;
    }
    .cover .cover-placeholder {
      display: flex;
    }
    .track-title {
      font-size: 1.2rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-artist {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.7);
      text-align: center;
      margin-bottom: 0.1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-album {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      text-align: center;
      margin-bottom: 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1.5rem;
    }
    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.1s;
    }
    button:hover { transform: scale(1.05); }
    button:active { transform: scale(0.95); }
    button.btn-active { background: #48bb78; }
    #fileInput { display: none; }
    .file-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .file-label {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #48bb78;
      border-radius: 8px;
      cursor: pointer;
    }
    .playlist {
      margin-top: 1rem;
      max-height: 180px;
      overflow-y: auto;
      border-radius: 8px;
    }
    .playlist:not(:empty) {
      background: rgba(0,0,0,0.2);
    }
    .playlist-item {
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
    }
    .playlist-item:hover { background: rgba(255,255,255,0.1); }
    .playlist-item.active { background: rgba(102,126,234,0.5); }
    .playlist-index {
      color: rgba(255,255,255,0.5);
      min-width: 1.5rem;
      text-align: right;
      font-size: 0.8rem;
    }
    .playlist-item-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .playlist-delete-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.4);
      padding: 0 0.25rem;
      font-size: 0.85rem;
      cursor: pointer;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .playlist-delete-btn:hover {
      color: #fc8181;
      background: rgba(252,129,129,0.15);
      transform: none;
    }
    .playlist-delete-btn:active { transform: none; }
    .playlist-empty {
      padding: 1.5rem;
      text-align: center;
      color: rgba(255,255,255,0.35);
      font-size: 0.9rem;
    }
    .progress-section {
      margin-top: 1.25rem;
    }
    .time-display {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 0.35rem;
    }
    .progress-container {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }
    .progress-container:hover .progress-bar {
      background: #7c8ef0;
    }
    .progress-bar {
      height: 100%;
      background: #667eea;
      border-radius: 3px;
      width: 0%;
      pointer-events: none;
    }
    .saved-playlists {
      margin-top: 1.1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
    .saved-playlists h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    .saved-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }
    .saved-row select,
    .saved-row button {
      font-size: 0.84rem;
      padding: 0.45rem 0.7rem;
      border-radius: 6px;
    }
    .saved-row select {
      flex: 1;
      min-width: 160px;
      border: none;
      background: rgba(255,255,255,0.16);
      color: #fff;
    }
    .saved-row select option {
      color: #111;
    }
    .saved-tracks {
      margin-top: 0.5rem;
      max-height: 150px;
      overflow-y: auto;
      border-radius: 8px;
      background: rgba(0,0,0,0.18);
    }
    .saved-track-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.6rem;
      font-size: 0.84rem;
    }
    .saved-track-item:hover {
      background: rgba(255,255,255,0.08);
    }
    .saved-track-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .saved-track-remove {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.4);
      padding: 0 0.25rem;
      font-size: 0.85rem;
      cursor: pointer;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .saved-track-remove:hover {
      color: #fc8181;
      background: rgba(252,129,129,0.15);
      transform: none;
    }
    .saved-empty {
      padding: 0.95rem;
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="player">
    <div class="cover">
      <span class="cover-placeholder">🎵</span>
      <img id="coverImg" alt="Album Cover">
    </div>

    <div class="track-title" id="trackTitle">未选择歌曲</div>
    <div class="track-artist" id="trackArtist"></div>
    <div class="track-album" id="trackAlbum"></div>

    <div class="progress-section">
      <div class="time-display">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
      </div>
      <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <div class="file-actions">
      <label for="fileInput" class="file-label">🎵 添加文件</label>
      <input type="file" id="fileInput" accept="audio/*" multiple>
      <button id="folderBtn">📂 添加文件夹</button>
      <button id="clearBtn">🗑 清空列表</button>
    </div>

    <div class="controls">
      <button id="prevBtn" title="上一首">⏮</button>
      <button id="playBtn">▶️ 播放</button>
      <button id="nextBtn" title="下一首">⏭</button>
      <button id="loopBtn" title="单曲循环: 关">🔂</button>
    </div>

    <div class="playlist" id="playlist"></div>

    <section class="saved-playlists">
      <h3>📚 我的歌单</h3>

      <div class="saved-row">
        <select id="savedPlaylistSelect">
          <option value="">暂无歌单</option>
        </select>
        <button id="savedCreateBtn">新建</button>
        <button id="savedRenameBtn">重命名</button>
        <button id="savedDeleteBtn">删除</button>
      </div>

      <div class="saved-row">
        <button id="savedAppendToQueueBtn">添加到当前列表</button>
        <button id="savedReplaceQueueBtn">替换当前列表</button>
        <button id="savedAddCurrentBtn">添加当前列表</button>
        <button id="savedImportBtn">导入 JSON</button>
        <button id="savedExportBtn">导出 JSON</button>
      </div>

      <div class="saved-tracks" id="savedTracks"></div>
    </section>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
