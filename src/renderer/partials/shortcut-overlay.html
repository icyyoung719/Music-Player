<div class="shortcut-overlay" id="shortcutOverlay" aria-hidden="true">
  <div class="shortcut-panel">
    <div class="shortcut-head">
      <div class="shortcut-title">快捷键设置</div>
      <button id="shortcutCloseBtn" title="关闭">关闭</button>
    </div>
    <div class="shortcut-tip">
      支持单键与组合键（示例：<code>Space</code>、<code>Ctrl+Right</code>、<code>Alt+M</code>）。<br>
      点击“修改”后按下目标按键可保存，点击“清空”可取消该功能绑定。
    </div>
    <div class="shortcut-list" id="shortcutList"></div>
    <div class="shortcut-actions">
      <button id="shortcutResetBtn" class="shortcut-reset" title="恢复默认快捷键">恢复默认</button>
      <button id="shortcutConfirmBtn" class="shortcut-confirm" title="确认并关闭快捷键面板">确认</button>
    </div>
  </div>
</div>
