<div class="song-page page-hidden" id="songPage">
  <div class="song-page-bg">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" id="songBackBtn" title="返回主页面">⌄</button>
      </div>
      <div class="topbar-right">
        <span class="play-mode-label">播放器模式</span>
        <button class="theme-toggle" data-theme-toggle title="切换明暗主题">🌙 暗色</button>
        <button class="icon-btn" title="全屏">⛶</button>
        <button class="icon-btn" id="windowMinimizeBtn" title="最小化">－</button>
        <button class="icon-btn" title="最大化">□</button>
        <button class="icon-btn" title="关闭">✕</button>
      </div>
    </header>

    <main class="main">
      <section class="left-panel">
        <div class="cover">
          <span class="cover-placeholder">🎵</span>
          <img id="coverImg" alt="Album Cover">
        </div>
      </section>

      <section class="right-panel">
        <div class="meta-block">
          <div class="meta-row">
            <div class="track-title" id="trackTitle">未选择歌曲</div>
            <span class="meta-tag">本地</span>
            <span class="meta-tag">MV</span>
          </div>
          <div class="track-artist" id="trackArtist">请选择本地音乐文件开始播放</div>
          <div class="track-album" id="trackAlbum"></div>
        </div>

        <div class="tabs">
          <button class="tab active">歌词</button>
          <button class="tab">百科</button>
          <button class="tab">相似推荐</button>
        </div>

        <div class="content-stack">
          <div class="content-main">
            <div class="lyrics-container" id="lyricsContainer">
              <div class="lyrics-wrapper" id="lyricsWrapper">
                <div class="lyric-line no-lyrics">暂无歌词</div>
              </div>
            </div>

            <div class="panel-card">
              <div class="file-actions">
                <label for="fileInput" class="file-label">🎵 添加文件</label>
                <input type="file" id="fileInput" accept="audio/*" multiple>
                <button id="folderBtn">📂 添加文件夹</button>
                <button id="clearBtn">🗑 清空列表</button>
              </div>

              <div style="margin-top: 10px; margin-bottom: 6px; font-size: 13px; color: rgba(255,255,255,0.82);">当前播放列表</div>
              <div class="playlist" id="playlist"></div>
            </div>
          </div>

          <aside class="float-tools">
            <button title="喜欢">♥</button>
            <button title="评论">💬</button>
            <button title="音效">音</button>
            <button title="翻译">译</button>
            <button title="更多">⋯</button>
          </aside>
        </div>
      </section>
    </main>

    <footer class="bottombar">
      <div class="progress-section">
        <div class="time-display">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
        <div class="progress-container" id="progressContainer">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <div class="bottom-main">
        <div class="bottom-left">
          <div class="bottom-track" id="bottomTrackTitle">&nbsp;</div>
          <div class="bottom-artist" id="bottomTrackArtist">&nbsp;</div>
        </div>

        <div class="controls">
          <button id="loopBtn" title="单曲循环: 关">🔂</button>
          <button id="prevBtn" title="上一首">⏮</button>
          <button id="playBtn" title="播放 / 暂停">▶</button>
          <button id="nextBtn" title="下一首">⏭</button>
        </div>

        <div class="bottom-right">
          <button class="icon-btn" title="歌词">词</button>
          <button class="icon-btn" title="音量">🔊</button>
          <button class="icon-btn" title="更多">⋯</button>
        </div>
      </div>
    </footer>
  </div>
</div>
