<div class="playlist-overlay" id="neteasePlaylistOverlay" aria-hidden="true">
  <div class="playlist-overlay-panel" role="dialog" aria-modal="true" aria-label="网易云歌单详情">
    <div class="playlist-overlay-head">
      <div class="playlist-overlay-title">歌单详情</div>
      <button id="neteasePlaylistOverlayCloseBtn" title="关闭歌单详情">关闭</button>
    </div>

    <div class="playlist-overlay-summary" id="neteasePlaylistOverlaySummary">
      <div class="playlist-overlay-cover" id="neteasePlaylistOverlayCover" aria-hidden="true">
        <span id="neteasePlaylistOverlayCoverText">♪</span>
      </div>
      <div class="playlist-overlay-meta">
        <div class="playlist-overlay-name" id="neteasePlaylistOverlayName">正在加载...</div>
        <div class="playlist-overlay-sub" id="neteasePlaylistOverlaySub">请稍候</div>
        <div class="playlist-overlay-actions">
          <button id="neteasePlaylistOverlayPlayBtn">播放歌单</button>
          <button id="neteasePlaylistOverlayDownloadBtn">下载歌单</button>
        </div>
      </div>
    </div>

    <div class="playlist-overlay-status" id="neteasePlaylistOverlayStatus">点击歌单卡片可查看歌曲列表。</div>
    <div class="playlist-overlay-track-grid" id="neteasePlaylistOverlayTrackList">
      <div class="netease-search-empty">暂无歌曲</div>
    </div>
  </div>
</div>
