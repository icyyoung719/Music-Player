<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' blob:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 Music Player</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .player {
      width: 90%;
      max-width: 600px;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(10px);
    }
    .cover {
      width: 200px;
      height: 200px;
      background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1.5rem;
    }
    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.1s;
    }
    button:hover { transform: scale(1.05); }
    button:active { transform: scale(0.95); }
    #fileInput { display: none; }
    .file-label {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #48bb78;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="player">
    <div class="cover">🎵</div>
    
    <label for="fileInput" class="file-label">📁 选择音乐文件</label>
    <input type="file" id="fileInput" accept="audio/*">
    
    <div id="trackInfo">未选择歌曲</div>
    
    <div class="controls">
      <button id="prevBtn">⏮</button>
      <button id="playBtn">▶️ 播放</button>
      <button id="nextBtn">⏭</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
