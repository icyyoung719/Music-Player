<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' blob:; img-src 'self' data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 Music Player</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .player {
      width: 90%;
      max-width: 600px;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(10px);
    }
    .cover {
      width: 200px;
      height: 200px;
      background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      overflow: hidden;
    }
    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }
    .track-title {
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-artist {
      font-size: 1rem;
      color: #a0aec0;
      text-align: center;
      margin-bottom: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-album {
      font-size: 0.85rem;
      color: #718096;
      text-align: center;
      margin-bottom: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-meta {
      font-size: 0.8rem;
      color: #718096;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1.5rem;
    }
    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.1s;
    }
    button:hover { transform: scale(1.05); }
    button:active { transform: scale(0.95); }
    #fileInput { display: none; }
    .file-label {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #48bb78;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="player">
    <div class="cover" id="coverArt">🎵</div>

    <div class="track-title" id="trackTitle">未选择歌曲</div>
    <div class="track-artist" id="trackArtist"></div>
    <div class="track-album" id="trackAlbum"></div>
    <div class="track-meta" id="trackMeta"></div>

    <label for="fileInput" class="file-label">📁 选择音乐文件</label>
    <input type="file" id="fileInput" accept="audio/*">

    <div id="trackInfo" style="display:none;"></div>

    <div class="controls">
      <button id="prevBtn">⏮</button>
      <button id="playBtn">▶️ 播放</button>
      <button id="nextBtn">⏭</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
